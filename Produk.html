<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus×FixaStore Profesional FF</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0a0a0a;
    overflow-x:hidden;
    color:#fff;
    position:relative;
    height:100vh;
}
canvas#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Marquee Neon */
#marquee{
    background:#1a0f2b;
    color:#27ae60;
    padding:10px;
    overflow:hidden;
    white-space:nowrap;
    box-shadow:0 0 10px #8e44ad;
}
#marquee span{
    display:inline-block;
    padding-left:100%;
    animation:marquee 15s linear infinite;
}
@keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

/* Judul Neon mutar-mutar */
#product-title{
    text-align:center;
    font-size:2em;
    margin:20px 0;
    text-shadow:0 0 5px #8e44ad, 0 0 10px #27ae60;
    animation: spinTitle 10s linear infinite;
    display:inline-block;
}
@keyframes spinTitle {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(2deg); }
    50% { transform: rotate(0deg); }
    75% { transform: rotate(-2deg); }
    100% { transform: rotate(0deg); }
}

/* Pencarian & Filter */
#search-input{
    width:calc(100%-40px);
    margin:0 auto 10px auto;
    display:block;
    padding:10px;
    border-radius:8px;
    border:2px solid #8e44ad;
    background:#0a0a0a;
    color:#fff;
    text-align:center;
}

.filter-bar{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}
.filter-bar button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#8e44ad;
    color:#fff;
    transition:0.3s;
}
.filter-bar button.active,
.filter-bar button:hover{
    background:#27ae60;
    box-shadow:0 0 15px #8e44ad,0 0 30px #27ae60;
}

/* Grid Produk ugalan + goyang */
#product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
    animation: swingGrid 3s ease-in-out infinite;
    position:relative;
}
@keyframes swingGrid{
    0%{transform:translateX(0px);}
    25%{transform:translateX(3px);}
    50%{transform:translateX(0px);}
    75%{transform:translateX(-3px);}
    100%{transform:translateX(0px);}
}

/* Kartu Neon + efek ugalan */
.product-card{
    background:#1a0f2b;
    border:2px solid #8e44ad;
    border-radius:12px;
    box-shadow:0 0 10px #8e44ad,0 0 20px #27ae60;
    padding:15px;
    transition:transform 1s ease, box-shadow 0.3s;
    position:relative;
}
.product-card:hover{
    box-shadow:0 0 20px #8e44ad,0 0 40px #27ae60,0 0 60px #8e44ad;
}
.product-card img{
    width:100%;
    border-radius:8px;
}

/* Tombol */
.btn-order,.btn-info,.btn-complain,.btn-fav{
    display:inline-block;
    margin:5px 5px 0 0;
    padding:8px 12px;
    background-color:#8e44ad;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
    cursor:pointer;
}
.btn-order:hover,.btn-info:hover,.btn-complain:hover,.btn-fav:hover{
    background-color:#27ae60;
    box-shadow:0 0 15px #8e44ad,0 0 30px #27ae60;
    transform:scale(1.05);
}

/* WhatsApp Mengambang */
#whatsapp-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    z-index:9999;
    border-radius:50%;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    transition:transform 0.3s;
}
#whatsapp-float img{width:100%;height:100%;}
#whatsapp-float:hover{transform:scale(1.1);}

/* Modal Info & Keluhan */
#modal,#complainModal{
    display:none;
    position:fixed;
    z-index:9998;
    left:0;top:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
}
#modal-content,#complainContent{
    background:#1a0f2b;
    margin:10% auto;
    padding:20px;
    width:80%;
    max-width:400px;
    border-radius:12px;
    box-shadow:0 0 15px #8e44ad;
    color:#fff;
    text-align:center;
}
#modal-content button,#complainContent button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#27ae60;
    color:#fff;
    cursor:pointer;
}
#complainContent textarea{
    width:100%;
    height:80px;
    margin-top:10px;
    padding:8px;
    border-radius:8px;
    border:2px solid #8e44ad;
    background:#0a0a0a;
    color:#fff;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="marquee"><span>🔥 Nexus×FixaStore Free Fire Profesional - Support Android 10+14, Non-root, No Virtual 🔥</span></div>

<h2 id="product-title">Produk Free Fire Nexus×FixaStore</h2>

<input type="text" id="search-input" placeholder="Cari produk..." onkeyup="loadProducts()">

<!-- FILTER PLATFORM -->
<div class="filter-bar" id="filter-platform">
  <button class="active" onclick="setPlatform('ALL',this)">Semua Platform</button>
  <button onclick="setPlatform('Android',this)">Android</button>
  <button onclick="setPlatform('iOS',this)">iOS</button>
  <button onclick="setPlatform('PC',this)">PC</button>
</div>

<!-- FILTER HARGA -->
<div class="filter-bar" id="filter-harga">
  <button class="active" onclick="setHarga('ALL',this)">Semua</button>
  <button onclick="setHarga('FREE',this)">Gratis</button>
  <button onclick="setHarga('VIP',this)">Berbayar</button>
</div>

<div id="product-grid"></div>

<a href="https://whatsapp.com/channel/0029Vb7TaMYD38CPLxnCaY1K" target="_blank" id="whatsapp-float">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<!-- Modal Info -->
<div id="modal">
  <div id="modal-content">
    <p id="modal-text"></p>
    <button onclick="closeModal()">Tutup</button>
  </div>
</div>

<!-- Modal Keluhan -->
<div id="complainModal">
  <div id="complainContent">
    <h3>Laporkan Masalah</h3>
    <select id="complainType">
      <option value="Tidak bisa pilih barang">Tidak bisa pilih barang</option>
      <option value="Harga tidak muncul">Harga tidak muncul</option>
      <option value="Lainnya">Lainnya</option>
    </select>
    <textarea id="complainText" placeholder="Tuliskan keluhan Anda..."></textarea>
    <button onclick="sendComplain()">Kirim Keluhan</button>
    <button onclick="closeComplain()">Tutup</button>
  </div>
</div>

<script>
// DATA PRODUK (Hanya FF)
const products=[
  {
    nama:"Panel Nexus",
    gambar:"https://i.ibb.co/1f7G8T7v/IMG-20260315-192221.jpg",
    harga:"FREE",
    platform:"Android",
    fitur:"Aimbot\nGlobal Terbalik\nSupport Android 10+14, Non-root, No Virtual",
    link:"https://whatsapp.com/channel/0029Vb7TaMYD38CPLxnCaY1K",
    tombol:"DOWNLOAD & GABUNG"
  },
  {
    nama:"Nexus VIP",
    gambar:"https://i.ibb.co/1f7G8T7v/IMG-20260315-192221.jpg",
    harga:"VIP",
    platform:"iOS",
    fitur:"Aimbot\nGlobal Terbalik\nVIP Eksklusif\nSupport Android 10+14, Non-root, No Virtual",
    link:"https://whatsapp.com/channel/0029Vb7TaMYD38CPLxnCaY1K",
    tombol:"BELI & GABUNG"
  },
  {
    nama:"BR MODS Free",
    gambar:"https://ibb.co/gbfsWNXn",
    harga:"FREE",
    platform:"Android",
    fitur:"MOD Free Fire\nSupport Semua Android\nNon-root",
    link:"https://whatsapp.com/channel/0029Vb7TaMYD38CPLxnCaY1K",
    tombol:"DOWNLOAD & GABUNG"
  }
];

let filterPlatform="ALL";
let filterHarga="ALL";

// FAVORIT
let favorites = JSON.parse(localStorage.getItem('favorites')||'[]');

function toggleFavorite(productName){
    if(favorites.includes(productName)){
        favorites = favorites.filter(p=>p!==productName);
    } else {
        favorites.push(productName);
    }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    loadProducts();
}

// LOAD PRODUK + efek ugalan
function loadProducts(){
  const grid=document.getElementById("product-grid");
  const searchInput=document.getElementById("search-input").value.toUpperCase();
  grid.innerHTML="";
  products.forEach((p,index)=>{
    const matchSearch=p.nama.toUpperCase().includes(searchInput);
    const matchPlatform=(filterPlatform==="ALL")||(filterPlatform===p.platform);
    const matchHarga=(filterHarga==="ALL")||(filterHarga===p.harga);
    if(matchSearch && matchPlatform && matchHarga){
      const isFav=favorites.includes(p.nama);
      const card=document.createElement('div');
      card.className='product-card';
      card.innerHTML=`
        <img src="${p.gambar}" alt="${p.nama}">
        <h3>${p.nama} ${isFav?"⭐":""}</h3>
        <p>HARGA: ${p.harga==="FREE"?"FREE":"Rp10.000 (Permanen)"}</p>
        <button class="btn-info" onclick="showInfo('${p.fitur.replace(/\n/g,'\\n')}')">INFO</button>
        <a class="btn-order" href="${p.link}" target="_blank">${p.tombol}</a>
        <button class="btn-fav" onclick="toggleFavorite('${p.nama}')">${isFav?"Hapus Favorit":"⭐ Favorit"}</button>
        <button class="btn-complain" onclick="openComplain()">Keluhan</button>
      `;
      grid.appendChild(card);
      // efek slide + jalan-jalan
      card.style.transform='translateX(100%)';
      setTimeout(()=>{card.style.transition='transform 1s ease'; card.style.transform='translateX(0)';},50);
      // loop jalan-jalan
      setInterval(()=>{
        card.style.transform='translateX(5px)';
        setTimeout(()=>{card.style.transform='translateX(0)';},500);
      },3000+index*500);
    }
  });
}
loadProducts();

// MODAL
function showInfo(fitur){
  document.getElementById('modal-text').innerText=fitur.replace(/\\n/g,'\n');
  document.getElementById('modal').style.display='block';
}
function closeModal(){document.getElementById('modal').style.display='none';}

// COMPLAIN
function openComplain(){document.getElementById('complainModal').style.display='block';}
function closeComplain(){document.getElementById('complainModal').style.display='none';}
function sendComplain(){
  const type=document.getElementById('complainType').value;
  const text=document.getElementById('complainText').value;
  if(text.trim()===''){alert('Isi keluhan dulu!');return;}
  const message=`Keluhan: ${type}\nDeskripsi: ${text}`;
  const waLink='https://wa.me/?text='+encodeURIComponent(message);
  window.open(waLink,'_blank');
  closeComplain();
}

// FILTER
function setPlatform(type,btn){
  filterPlatform=type;
  document.querySelectorAll('#filter-platform button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadProducts();
}
function setHarga(type,btn){
  filterHarga=type;
  document.querySelectorAll('#filter-harga button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadProducts();
}
document.getElementById('search-input').addEventListener('keyup',loadProducts);

// ANIMASI BACKGROUND Hujan + Gelembung + Petir + Salju
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<150;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    d:Math.random()*1,
    speedY:Math.random()*1+0.5,
    speedX:Math.random()*0.5-0.25
  });
}

let lightnings=[];
function createLightning(){
  lightnings.push({x:Math.random()*canvas.width,y:0,length:Math.random()*100+50});
}
setInterval(createLightning,2000);

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,false);
    ctx.fillStyle='rgba(142,68,173,0.5)';
    ctx.fill();
    p.y+=p.speedY;
    p.x+=p.speedX;
    if(p.y>canvas.height)p.y=0;
    if(p.x>canvas.width)p.x=0;
    if(p.x<0)p.x=canvas.width;
  });
  lightnings.forEach((l,i)=>{
    ctx.strokeStyle='rgba(255,255,255,0.8)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(l.x,l.y);
    ctx.lineTo(l.x+Math.random()*10-5,l.y+l.length);
    ctx.stroke();
    l.y+=5;
    if(l.y>canvas.height) lightnings.splice(i,1);
  });
  for(let i=0;i<50;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,Math.random()*2+1,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fill();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
